name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build PyInstaller bundle
        run: pyinstaller packaging/markitdown_gui.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc packaging\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/installer/*.exe
          if-no-files-found: error

  build-macos:
    # macos-latest is Apple Silicon (arm64). The shipped .dmg is therefore
    # arm64-only. To also support Intel macs, add a matrix entry for
    # macos-13 (x86_64) and ship two .dmgs, or build a universal2 bundle.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build .app bundle
        run: pyinstaller packaging/markitdown_gui.spec

      - name: Build .dmg
        run: |
          mkdir -p dist/installer
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          hdiutil create \
            -volname "MarkItDown GUI" \
            -srcfolder "dist/MarkItDown GUI.app" \
            -ov -format UDZO \
            "dist/installer/MarkItDownGUI-${VERSION}-arm64.dmg"

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/installer/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
